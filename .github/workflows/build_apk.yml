name: 🏋️ FitNova APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: 🏗️ Create Flutter Scaffold + Merge Our Code
        run: |
          # Step 1: Create fresh Flutter project in temp
          flutter create --project-name fitnova --org com.fitnova --platforms android /tmp/fresh_fitnova
          
          # Step 2: Replace generated lib/ with our custom lib/
          rm -rf /tmp/fresh_fitnova/lib
          cp -r flutter_app/lib /tmp/fresh_fitnova/lib
          
          # Step 3: Replace generated pubspec.yaml with ours
          cp flutter_app/pubspec.yaml /tmp/fresh_fitnova/pubspec.yaml
          
          # Step 4: Set minSdkVersion to 21 (for flutter_secure_storage)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' \
            /tmp/fresh_fitnova/android/app/build.gradle
          
          echo "=== Project structure ==="
          ls /tmp/fresh_fitnova/

      - name: 📦 Flutter Pub Get
        working-directory: /tmp/fresh_fitnova
        run: flutter pub get

      - name: 🔍 Analyze (non-fatal)
        working-directory: /tmp/fresh_fitnova
        run: flutter analyze --no-fatal-infos 2>&1 || true

      - name: 🔨 Build Debug APK
        working-directory: /tmp/fresh_fitnova
        run: flutter build apk --debug 2>&1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FitNova-debug-APK
          path: /tmp/fresh_fitnova/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: ✅ Done
        run: |
          echo "APK built successfully!"
          ls -lh /tmp/fresh_fitnova/build/app/outputs/flutter-apk/app-debug.apk
