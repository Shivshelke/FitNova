name: 🏋️ FitNova APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger button on GitHub

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required for Android build) ────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter ───────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      # ── 4. Check Flutter version ───────────────────────────────────────
      - name: ✅ Flutter Version
        run: flutter --version

      # ── 5. Create Flutter project scaffold ────────────────────────────
      #    (our lib/ files are already there, just need the android scaffold)
      - name: 🏗️ Create Flutter Project Scaffold
        working-directory: flutter_app
        run: |
          flutter create --project-name fitnova --org com.fitnova --platforms android . --no-pub
          echo "Flutter scaffold created"

      # ── 6. Install dependencies ────────────────────────────────────────
      - name: 📦 Install Flutter Dependencies
        working-directory: flutter_app
        run: flutter pub get

      # ── 7. Analyze code (non-blocking) ────────────────────────────────
      - name: 🔍 Analyze Code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos || true

      # ── 8. Build Debug APK ─────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        working-directory: flutter_app
        run: flutter build apk --debug --verbose

      # ── 9. Upload APK as artifact ──────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitNova-debug-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30   # 30 din tak download available

      # ── 10. Print APK size ─────────────────────────────────────────────
      - name: 📊 APK Info
        working-directory: flutter_app
        run: |
          echo "✅ APK Build Successful!"
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo "📱 Download the APK from the Actions tab → Artifacts section"
