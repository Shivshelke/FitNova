name: 🏋️ FitNova APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Java Setup ──────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter Setup ───────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: ✅ Flutter Version
        run: flutter --version

      # ── 4. Create fresh Flutter project alongside, then merge ──────────
      - name: 🏗️ Bootstrap Flutter Android Project
        run: |
          # Create a fresh Flutter project in a temp location
          flutter create --project-name fitnova --org com.fitnova --platforms android /tmp/fitnova_scaffold
          
          # Copy essential Android scaffold files that we don't have
          cp -r /tmp/fitnova_scaffold/android/gradle         flutter_app/android/
          cp    /tmp/fitnova_scaffold/android/gradlew        flutter_app/android/
          cp    /tmp/fitnova_scaffold/android/gradlew.bat    flutter_app/android/
          cp    /tmp/fitnova_scaffold/android/build.gradle   flutter_app/android/
          cp    /tmp/fitnova_scaffold/android/settings.gradle flutter_app/android/
          cp    /tmp/fitnova_scaffold/android/gradle.properties flutter_app/android/
          
          # Copy app-level scaffold files we haven't customised
          mkdir -p flutter_app/android/app/src/main/kotlin/com/fitnova/fitnova
          mkdir -p flutter_app/android/app/src/main/res
          cp -r /tmp/fitnova_scaffold/android/app/src/main/res/   flutter_app/android/app/src/main/res/
          cp    /tmp/fitnova_scaffold/android/app/src/main/AndroidManifest.xml flutter_app/android/app/src/main/AndroidManifest.xml
          cp    /tmp/fitnova_scaffold/android/app/src/main/kotlin/com/fitnova/fitnova/MainActivity.kt flutter_app/android/app/src/main/kotlin/com/fitnova/fitnova/MainActivity.kt
          
          # Make gradlew executable
          chmod +x flutter_app/android/gradlew
          
          echo "✅ Android scaffold files copied"
          ls flutter_app/android/

      # ── 5. Install dependencies ────────────────────────────────────────
      - name: 📦 flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      # ── 6. Fix import issues if any ────────────────────────────────────
      - name: 🔍 Analyze (non-blocking)
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos || true

      # ── 7. Build APK ───────────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        working-directory: flutter_app
        run: flutter build apk --debug

      # ── 8. Upload APK ──────────────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitNova-debug-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # ── 9. Summary ─────────────────────────────────────────────────────
      - name: 📊 Build Summary
        working-directory: flutter_app
        run: |
          echo "✅ FitNova APK Build Successful!"
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo ""
          echo "📱 Download APK from: Actions → This Run → Artifacts → FitNova-debug-APK"
