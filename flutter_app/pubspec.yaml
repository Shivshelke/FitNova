name: fitnova
description: "FitNova - Modern Fitness Tracking App"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP client
  dio: ^5.4.3

  # Secure local storage (JWT token)
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.4

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Google Sign-In (requires Firebase setup)
  google_sign_in: ^6.2.1

  # Image picker (for avatar upload)
  image_picker: ^1.0.7

  # Shared preferences (settings)
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

  # Date/time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
