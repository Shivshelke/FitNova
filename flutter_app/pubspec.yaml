name: fitnova
description: "FitNova - Modern Fitness Tracking App"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.4.3
  http: ^1.2.1

  # Secure local storage (JWT token)
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.4

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Google Sign-In (requires Firebase setup)
  google_sign_in: ^6.2.1

  # Local notifications
  flutter_local_notifications: ^17.1.2

  # Image picker (for avatar upload)
  image_picker: ^1.0.7

  # Shared preferences (settings)
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

  # Lottie animations
  lottie: ^3.1.0

  # Date/time formatting
  intl: ^0.19.0

  # URL launcher
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
